# タスクの設定

[tasks.format]
description = "Format source files"
shell = "bash"
run = '''
#!/usr/bin/env bash
set -euo pipefail
find include examples tests \
    -type f \( -name '*.hpp' -o -name '*.cpp' -o -name '*.h' -o -name '*.c' \) \
    -print0 |
xargs -0 clang-format -i
'''

[tasks.format-check]
description = "Check C++ source formatting"
shell = "bash"
run = '''
#!/usr/bin/env bash
set -euo pipefail
find include examples tests \
    -type f \( -name '*.hpp' -o -name '*.cpp' -o -name '*.h' -o -name '*.c' \) \
    -print0 |
xargs -0 clang-format --dry-run --Werror
'''
